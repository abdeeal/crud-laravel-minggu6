<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tabel Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">Aplikasi Kampus</a>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">Beranda</a>
                <a class="nav-link active" href="data.html">Tabel Data</a>
                <a class="nav-link" href="form.html">Tambah Data</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Data Mahasiswa</h2>
        <a href="form.html" class="btn btn-success mb-3">Tambah Data Baru</a>
        <table id="tabelMahasiswa" class="table table-striped table-bordered">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>NIM</th>
                    <th>Nama</th>
                    <th>Jurusan</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
    <script>
        $(document).ready(function() {
            // Inisialisasi DataTable dengan source JSON dari API
            const table = $('#tabelMahasiswa').DataTable({
                ajax: {
                    url: '/api/mahasiswa',
                    dataSrc: ''
                },
                columns: [
                    { data: 'id' },
                    { data: 'nim' },
                    { data: 'nama' },
                    { data: 'jurusan' },
                    {
                        data: null,
                        render: function(data, type, row) {
                            return `
                                <a href="form.html?id=${row.id}" class="btn btn-sm btn-warning">Edit</a>
                                <button class="btn btn-sm btn-danger" onclick="hapusData(${row.id})">Hapus</button>
                            `;
                        }
                    }
                ]
            });
        });

        // Fungsionalitas Delete
        function hapusData(id) {
            if(confirm('Yakin ingin menghapus data ini?')) {
                $.ajax({
                    url: `/api/mahasiswa/${id}`,
                    type: 'DELETE',
                    success: function(result) {
                        alert(result.message);
                        $('#tabelMahasiswa').DataTable().ajax.reload();
                    }
                });
            }
        }
    </script>
</body>
</html>
