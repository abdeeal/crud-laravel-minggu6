<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Form Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">Aplikasi Kampus</a>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">Beranda</a>
                <a class="nav-link" href="data.html">Tabel Data</a>
                <a class="nav-link active" href="form.html">Form Data</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 id="formTitle">Tambah Data Mahasiswa</h2>
        <form id="formMahasiswa" class="mt-3" style="max-width: 500px;">
            <input type="hidden" id="mhsId">
            <div class="mb-3">
                <label class="form-label">NIM</label>
                <input type="text" class="form-control" id="nim" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Nama Lengkap</label>
                <input type="text" class="form-control" id="nama" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Jurusan</label>
                <input type="text" class="form-control" id="jurusan" required>
            </div>
            <button type="submit" class="btn btn-primary">Simpan Data</button>
            <a href="data.html" class="btn btn-secondary">Batal</a>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            // Cek URL apakah ada parameter ?id= (berarti mode EDIT)
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (id) {
                $('#formTitle').text('Edit Data Mahasiswa');
                // Tarik data JSON dan masukkan ke form
                $.get(`/api/mahasiswa/${id}`, function(data) {
                    $('#mhsId').val(data.id);
                    $('#nim').val(data.nim);
                    $('#nama').val(data.nama);
                    $('#jurusan').val(data.jurusan);
                });
            }

            // Aksi saat form disubmit
            $('#formMahasiswa').submit(function(e) {
                e.preventDefault();
                
                const formData = {
                    nim: $('#nim').val(),
                    nama: $('#nama').val(),
                    jurusan: $('#jurusan').val()
                };

                const currentId = $('#mhsId').val();
                
                // Jika ada ID = Update, jika tidak ada = Create
                const method = currentId ? 'PUT' : 'POST';
                const url = currentId ? `/api/mahasiswa/${currentId}` : '/api/mahasiswa';

                $.ajax({
                    url: url,
                    type: method,
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    success: function(response) {
                        alert(response.message);
                        window.location.href = 'data.html';
                    }
                });
            });
        });
    </script>
</body>
</html>
